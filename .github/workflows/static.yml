<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cure Homeo Clinic | Dr. Mrinal Kanti Das</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary-color: #2e6f40; /* Deep Calming Green */
            --secondary-color: #e8f3ec; /* Soft Mint Background */
            --accent-color: #25D366; /* WhatsApp Green */
            --text-main: #333333;
            --text-light: #666666;
            --white: #ffffff;
            --divider: #e0e0e0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--secondary-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card {
            background-color: var(--white);
            max-width: 500px;
            width: 100%;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(46, 111, 64, 0.1);
            overflow: hidden;
            text-align: center;
            position: relative;
        }

        .header-bg {
            background: linear-gradient(135deg, var(--primary-color), #439b5b);
            height: 120px;
            width: 100%;
        }

        .profile-section {
            padding: 0 30px 30px;
            margin-top: -60px;
        }

        .icon-circle {
            width: 100px;
            height: 100px;
            background-color: var(--white);
            border-radius: 50%;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            margin-bottom: 15px;
            border: 4px solid var(--secondary-color);
        }

        .icon-circle i {
            font-size: 40px;
            color: var(--primary-color);
        }

        h1 {
            font-family: 'Playfair Display', serif;
            color: var(--primary-color);
            font-size: 28px;
            margin-bottom: 5px;
        }

        .clinic-name {
            font-size: 18px;
            font-weight: 500;
            color: var(--text-main);
            margin-bottom: 10px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .degree {
            font-size: 14px;
            color: var(--text-light);
            margin-bottom: 25px;
            line-height: 1.5;
            padding: 0 10px;
        }

        .info-list {
            list-style: none;
            text-align: left;
            margin-bottom: 20px;
            padding: 15px;
            background-color: #f9fbf9;
            border-radius: 12px;
        }

        .info-list li {
            margin-bottom: 12px;
            display: flex;
            align-items: flex-start;
            font-size: 14px;
            color: var(--text-main);
        }

        .info-list li:last-child {
            margin-bottom: 0;
        }

        .info-list i {
            color: var(--primary-color);
            margin-right: 15px;
            margin-top: 3px;
            width: 20px;
            text-align: center;
        }

        .about-section {
            text-align: left;
            margin-bottom: 25px;
            padding: 0 5px;
        }

        .about-section h3 {
            font-size: 16px;
            color: var(--primary-color);
            margin-bottom: 8px;
            font-weight: 600;
        }

        .about-section p {
            font-size: 14px;
            color: var(--text-light);
            line-height: 1.6;
        }

        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            padding: 14px 20px;
            border-radius: 10px;
            font-weight: 600;
            transition: all 0.3s ease;
            font-size: 16px;
        }

        .btn-booking {
            background-color: var(--primary-color);
            color: var(--white);
        }

        .btn-booking:hover {
            background-color: #1e4a2a;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(46, 111, 64, 0.3);
        }

        .btn-whatsapp {
            background-color: var(--accent-color);
            color: var(--white);
        }

        .btn-whatsapp:hover {
            background-color: #1ebd5a;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(37, 211, 102, 0.3);
        }

        .social-footer {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid var(--divider);
        }

        .social-footer p {
            font-size: 14px;
            color: var(--text-light);
            margin-bottom: 15px;
            line-height: 1.6;
        }

        .social-footer strong {
            color: var(--text-main);
            font-size: 16px;
        }

        .social-icons {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .social-icons a {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 40px;
            height: 40px;
            background-color: #f0f2f5;
            color: var(--primary-color); 
            border-radius: 50%;
            text-decoration: none;
            font-size: 18px;
            transition: all 0.3s ease;
        }

        .social-icons a.facebook {
            color: #1877F2;
        }

        .social-icons a:hover {
            background-color: var(--primary-color);
            color: var(--white);
            transform: scale(1.1);
        }

        .social-icons a.facebook:hover {
            background-color: #1877F2;
            color: var(--white);
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="header-bg"></div>
        
        <div class="profile-section">
            <div class="icon-circle">
                <i class="fa-solid fa-leaf"></i>
            </div>
            
            <h1>Dr. Mrinal Kanti Das</h1>
            <div class="clinic-name">Cure Homeo Clinic</div>
            <div class="degree">
                RMPS(BRMT &TC),DMBS(cal) <br>
                <small>CHD( MHRD, Govt. Of India)</small>
            </div>

            <div class="about-section">
                <h3>About the Doctor</h3>
                <p>Dedicated to providing holistic and natural homeopathic care. Treating the root cause of ailments with safe, effective, and personalized treatments for patients across the region.</p>
            </div>

            <ul class="info-list">
                <li>
                    <i class="fa-solid fa-location-dot"></i>
                    <span>Miyapur, Raghunathganj, MSD</span>
                </li>
                <li>
                    <i class="fa-solid fa-phone"></i>
                    <span><a href="tel:+917478232295" style="color: inherit; text-decoration: none;">+91 74782 32295</a></span>
                </li>
                <li>
                    <i class="fa-regular fa-clock"></i>
                    <span>
                        <strong>Fri - Wed:</strong> 10:00 AM - 2:00 PM <br> 
                        <span style="margin-left: 78px;">5:00 PM - 8:00 PM</span><br>
                        <strong>Thursday:</strong> Closed
                    </span>
                </li>
            </ul>

            <div class="action-buttons">
                <a href="https://calendly.com/xyzcrazy473/dr-mrinal-kanti-das" target="_blank" class="btn btn-booking">
                    <i class="fa-regular fa-calendar-check"></i> Book Appointment
                </a>
                
                <a href="https://wa.me/917478232295" target="_blank" class="btn btn-whatsapp">
                    <i class="fa-brands fa-whatsapp"></i> Chat on WhatsApp
                </a>
            </div>

            <div class="social-footer">
                <p>Connect with us <br> <strong>+91 74782 32295</strong></p>
                <div class="social-icons">
                    <a href="https://www.facebook.com/share/1AngvYacoY/" target="_blank" title="Facebook Page" class="facebook">
                        <i class="fa-brands fa-facebook-f"></i>
                    </a>
                    <a href="tel:+917478232295" title="Call Us">
                        <i class="fa-solid fa-phone"></i>
                    </a>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
